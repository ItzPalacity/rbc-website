<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Admin Password — RBC</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0d1b2a, #1b2d42); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: #fff; border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
    .logo-icon { width: 48px; height: 48px; background: #c0392b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: #fff; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #0d1b2a; }
    h1 { font-size: 22px; font-weight: 700; color: #0d1b2a; margin-bottom: 6px; }
    p { font-size: 13px; color: #5a5855; margin-bottom: 24px; line-height: 1.6; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: #0d1b2a; text-transform: uppercase; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #dddbd6; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; }
    input:focus { border-color: #c0392b; }
    button { width: 100%; padding: 12px; background: #c0392b; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 4px; }
    button:hover { background: #96281b; }
    .msg { margin-top: 14px; font-size: 13px; text-align: center; min-height: 18px; }
    .msg.success { color: #27ae60; }
    .msg.error { color: #c0392b; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #8a8880; text-decoration: none; }
    .back:hover { color: #c0392b; }
    .info { background: #fef9e7; border: 1px solid #f39c12; border-radius: 6px; padding: 12px 14px; font-size: 12px; color: #7d6608; margin-bottom: 20px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">RBC</div>
    <div class="logo-text">Redmont Broadcasting</div>
  </div>
  <h1>Reset Admin Password</h1>
  <p>Enter your reset secret (set as <code>RESET_SECRET</code> in Railway env vars) and a new password.</p>
  <div class="info">
    💡 To set up: go to Railway → your project → Variables → add <strong>RESET_SECRET</strong> with any secret value you choose.
  </div>
  <div class="field">
    <label>Reset Secret</label>
    <input type="password" id="secret" placeholder="Your RESET_SECRET value" />
  </div>
  <div class="field">
    <label>New Password</label>
    <input type="password" id="new-pw" placeholder="At least 6 characters" />
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm-pw" placeholder="Repeat new password" />
  </div>
  <button onclick="resetPassword()">Reset Password</button>
  <div class="msg" id="msg"></div>
  <a href="/admin" class="back">← Back to Admin Login</a>
</div>
<script>
async function resetPassword() {
  const secret = document.getElementById('secret').value;
  const newPw = document.getElementById('new-pw').value;
  const confirmPw = document.getElementById('confirm-pw').value;
  const msgEl = document.getElementById('msg');
  msgEl.textContent = '';
  msgEl.className = 'msg';
  if (!secret || !newPw) { msgEl.textContent = 'Please fill in all fields.'; msgEl.className = 'msg error'; return; }
  if (newPw !== confirmPw) { msgEl.textContent = 'Passwords do not match.'; msgEl.className = 'msg error'; return; }
  if (newPw.length < 6) { msgEl.textContent = 'Password must be at least 6 characters.'; msgEl.className = 'msg error'; return; }
  try {
    const r = await fetch('/api/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret, newPassword: newPw })
    });
    const data = await r.json();
    if (!r.ok) { msgEl.textContent = data.error || 'Reset failed.'; msgEl.className = 'msg error'; return; }
    msgEl.textContent = '✓ Password reset! Redirecting to login…';
    msgEl.className = 'msg success';
    setTimeout(() => window.location.href = '/admin', 2000);
  } catch { msgEl.textContent = 'Network error.'; msgEl.className = 'msg error'; }
}
</script>
</body>
</html>
